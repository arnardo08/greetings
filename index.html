<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Good Morning</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Pacifico&display=swap');

    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #fceabb, #f8b500);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Fondo del modal */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.4);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Modal más pequeño pero con contenido grande */
    .modal {
      background: #fff;
      border-radius: 20px;
      padding: 40px;
      max-width: 700px; /* modal más compacto */
      width: 80%;
      height: auto;
      box-shadow: 0 12px 30px rgba(0,0,0,0.4);
      display: flex;
      flex-direction: column;
      justify-content: center; /* centra verticalmente */
      align-items: center;     /* centra horizontalmente */
      text-align: center;
    }

    .modal h2 {
      margin: 0 0 20px 0;
      color: #f8b500;
      font-size: 4em; /* título más grande */
      font-family: 'Pacifico', cursive; /* escritura a mano */
    }

    .modal p {
      font-size: 3em; /* texto más grande */
      color: #333;
      line-height: 1.4;
      font-family: 'Pacifico', cursive; /* escritura a mano */
      margin: 0;
    }

    .highlight {
      color: red; /* lovely en rojo */
      font-weight: bold;
    }

    .red-icon {
      color: red; /* figurita en rojo */
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="modal-overlay">
    <div class="modal">
      <h2>Good Morning ☀️</h2>
      <p>
        I hope your day will be as <span class="highlight">lovely</span><br>
        as you were yesterday <span class="red-icon">✨</span>
      </p>
    </div>
  </div>
</body>
</html>
