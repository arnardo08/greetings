<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#f8b500">
  <link rel="manifest" href="data:application/manifest+json,{\"name\":\"Good Morning\",\"short_name\":\"GoodMorning\",\"display\":\"standalone\",\"start_url\":\"./\",\"background_color\":\"#fceabb\",\"theme_color\":\"#f8b500\",\"icons\":[{\"src\":\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAIAAAD8GO2jAAAAK3RFWHRDcmVhdGlvbiBUaW1lADIwMjYtMDMtMzBUMTU6MzA6MzArMDA6MDBnO8DoAAAAFklEQVR4nGNgGAWjYBSMglEwCkYAAESEARk0QYgAAAAASUVORK5CYII=\",\"sizes\":\"32x32\",\"type\":\"image/png\"}]}" rel="manifest">
  <title>Good Morning</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Pacifico&display=swap');

    html, body {
      margin: 0;
      min-height: calc(var(--vh, 1vh) * 100);
      height: auto;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #fceabb, #f8b500);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* Fondo del modal */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.4);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Modal más pequeño pero con contenido grande */
    .modal {
      background: #fff;
      border-radius: 20px;
      padding: 40px;
      max-width: 700px; /* modal más compacto */
      width: 80%;
      height: auto;
      box-shadow: 0 12px 30px rgba(0,0,0,0.4);
      display: flex;
      flex-direction: column;
      justify-content: center; /* centra verticalmente */
      align-items: center;     /* centra horizontalmente */
      text-align: center;
    }

    .modal h2 {
      margin: 0 0 20px 0;
      color: #f8b500;
      font-size: 4em; /* título más grande */
      font-family: 'Pacifico', cursive; /* escritura a mano */
    }

    .modal p {
      font-size: 3em; /* texto más grande */
      color: #333;
      line-height: 1.4;
      font-family: 'Pacifico', cursive; /* escritura a mano */
      margin: 0;
    }

    .highlight {
      color: red; /* lovely en rojo */
      font-weight: bold;
    }

    .red-icon {
      color: red; /* figurita en rojo */
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="modal-overlay">
    <div class="modal">
      <h2>Good Morning ☀️</h2>
      <p>
        I hope your day will be as <span class="highlight">lovely</span><br>
        as you were yesterday <span class="red-icon">✨</span>
      </p>
    </div>
  </div>

  <script>
    function setVh() {
      document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
    }
    setVh();
    window.addEventListener('resize', setVh);

    if ('serviceWorker' in navigator) {
      // No se puede registrar SW desde inline HTML en GitHub Pages, pero dejamos control de fallback
      console.log('Service Worker disponible, registre un archivo sw.js externo si necesita cache offline');
    }
  </script>
</body>
</html>
